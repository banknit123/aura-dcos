name: AURA DCOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate workspace
        run: npm run validate

      - name: Prototype health check
        run: npm run health

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Release readiness check
        run: npm run release:check
